<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>
body{
  font-family: Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:50px;
}

.board{
  display:grid;
  grid-template-columns:repeat(3,100px);
  gap:5px;
}

.cell{
  width:100px;
  height:100px;
  border:2px solid black;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:40px;
  cursor:pointer;
}

#status{
  margin:20px;
  font-size:22px;
}

button{
  padding:10px 20px;
}
</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<div id="status">
Player X Turn
</div>

<div class="board">
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
</div>

<br>

<button onclick="restart()">
Restart
</button>

<script>
const cells=document.querySelectorAll(".cell");
const status=document.getElementById("status");

let current="X";

cells.forEach(cell=>{
cell.addEventListener("click",()=>{

if(cell.textContent===""){
cell.textContent=current;

current=current==="X"?"O":"X";

status.textContent=
"Player "+current+" Turn";
}

});
});

function restart(){
cells.forEach(c=>{
c.textContent="";
});

current="X";

status.textContent=
"Player X Turn";
}
</script>

</body>
</html>
